# Reusable workflow — DevSecOps pipeline cho 1 app trong monorepo
#
# Flow: SAST (Semgrep) + SCA (Trivy FS) → Build local → Trivy scan image
#       → Push GHCR → Cosign sign (chỉ khi enable_sign=true, manual approve)
#
# Caller truyền inputs để tái sử dụng cho frontend/backend/service khác.
# Xem .github/workflows/ci.yaml làm ví dụ caller.

name: App Pipeline (reusable)

on:
  workflow_call:
    inputs:
      app_name:
        description: "Tên app (frontend/backend/...) — dùng cho log + tag"
        required: true
        type: string
      context:
        description: "Build context (đường dẫn folder chứa Dockerfile)"
        required: true
        type: string
      dockerfile:
        description: "Đường dẫn Dockerfile (relative tới context)"
        required: false
        type: string
        default: "Dockerfile"
      image_name:
        description: "Full image name vd: ghcr.io/ngdmquannn/todo-app-frontend"
        required: true
        type: string
      enable_sign:
        description: "Bật cosign sign (true = sign + approve, false = skip)"
        required: false
        type: boolean
        default: false
      sign_environment:
        description: "GitHub Environment cho release approve (cosign + deploy GitOps)"
        required: false
        type: string
        default: "production-approve"
      enable_deploy:
        description: "Bật update GitOps repo (patch image tag) trong job release"
        required: false
        type: boolean
        default: false
      gitops_repo:
        description: "Repo GitOps trên GitLab, vd: gitlab.com/chow612/devsecops.git"
        required: false
        type: string
        default: ""
      gitops_files:
        description: "Danh sách file manifest cần patch tag (cách nhau bởi space), relative tới repo GitOps"
        required: false
        type: string
        default: ""
    secrets:
      COSIGN_PRIVATE_KEY:
        required: false
      COSIGN_PASSWORD:
        required: false
      NVD_API_KEY:
        description: "NVD API key cho OWASP Dependency-Check (optional — có key thì tải NVD nhanh & tránh rate-limit)"
        required: false
      GITLAB_GITOPS_TOKEN:
        description: "GitLab token (write_repository) để commit tag mới vào repo GitOps"
        required: false

jobs:
  # ─────────────────────────────────────────────
  # SAST — Semgrep (OWASP Top 10 + Security Audit)
  # ─────────────────────────────────────────────
  semgrep:
    name: "[${{ inputs.app_name }}] SAST (Semgrep)"
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      security-events: write   # upload SARIF lên Code Scanning
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        run: |
          semgrep scan \
            --config p/owasp-top-ten \
            --config p/security-audit \
            --config p/cwe-top-25 \
            --config p/secrets \
            --config p/python \
            --config p/flask \
            --config p/javascript \
            --config p/typescript \
            --config p/react \
            --config p/dockerfile \
            --config auto \
            --sarif --output semgrep.sarif ${{ inputs.context }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-${{ inputs.app_name }}-${{ github.run_id }}
          path: semgrep.sarif
          retention-days: 14
      # Đẩy lên Security tab — category riêng theo app để FE/BE không đè nhau
      - name: Upload Semgrep SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep-${{ inputs.app_name }}

  # ─────────────────────────────────────────────
  # SCA — Trivy FS (vuln + secret + misconfig)
  # ─────────────────────────────────────────────
  trivy-fs:
    name: "[${{ inputs.app_name }}] SCA (Trivy FS)"
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      security-events: write   # upload SARIF lên Code Scanning
    steps:
      - uses: actions/checkout@v4
      # Bản table — in ra log cho dễ đọc trực tiếp
      - name: Trivy FS scan (table to log)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ${{ inputs.context }}
          scanners: vuln,secret,misconfig
          format: table
          exit-code: 0
          severity: HIGH,CRITICAL
          ignore-unfixed: true
      # Bản SARIF — đẩy lên Security tab
      - name: Trivy FS scan (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ${{ inputs.context }}
          scanners: vuln,secret,misconfig
          format: sarif
          output: trivy-fs.sarif
          exit-code: 0
          severity: HIGH,CRITICAL
          ignore-unfixed: true
      - name: Upload Trivy SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-${{ inputs.app_name }}

  # ─────────────────────────────────────────────
  # SCA — OWASP Dependency-Check (deps → CVE qua NVD)
  # Bổ trợ Trivy: map requirements.txt / package-lock.json → CVE,
  # xuất SARIF + HTML report để audit/nộp coursework.
  # ─────────────────────────────────────────────
  dependency-check:
    name: "[${{ inputs.app_name }}] SCA (OWASP Dependency-Check)"
    runs-on: ubuntu-latest
    continue-on-error: true            # report-only, không chặn pipeline
    permissions:
      contents: read
      security-events: write   # upload SARIF lên Code Scanning
    steps:
      - uses: actions/checkout@v4

      # Cache NVD data — lần sau khỏi tải lại (đỡ chậm kể cả khi chưa có key)
      - name: Cache NVD database
        uses: actions/cache@v4
        with:
          path: ~/.dependency-check/data
          key: dependency-check-nvd-${{ inputs.app_name }}
          restore-keys: |
            dependency-check-nvd-

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "${{ inputs.app_name }}"
          path: ${{ inputs.context }}
          # SARIF (cho code-scanning) + HTML (report đẹp để nộp/audit)
          format: "ALL"
          out: reports
          # --disableNodeAudit : npm Audit API đổi payload → ODC submit sai
          #   gây "Invalid payload" → frontend (package-lock.json) fail.
          #   Vẫn giữ NVD CPE + RetireJS để quét vuln JS.
          # --disableOssIndex   : OSS Index nay bắt buộc token, không có → bỏ.
          args: >-
            --enableExperimental
            --disableNodeAudit
            --disableOssIndex
            ${{ secrets.NVD_API_KEY != '' && format('--nvdApiKey {0}', secrets.NVD_API_KEY) || '' }}

      - name: Upload Dependency-Check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-${{ inputs.app_name }}-${{ github.run_id }}
          path: reports
          retention-days: 14

      - name: Upload Dependency-Check SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/dependency-check-report.sarif
          category: owasp-dc-${{ inputs.app_name }}

  # ─────────────────────────────────────────────
  # Build to tar + Trivy scan image (no push)
  # ─────────────────────────────────────────────
  build-scan:
    name: "[${{ inputs.app_name }}] Build & Scan Image"
    runs-on: ubuntu-latest
    needs: [semgrep, trivy-fs, dependency-check]
    if: github.event_name == 'push'
    permissions:
      contents: read
      actions: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_ref: ${{ inputs.image_name }}:${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image_name }}
          # priority cao hơn type=ref(branch,600) để outputs.version = tag sha
          # (vd main-b1fd626) thay vì chỉ 'main' — TAG này dùng patch GitOps.
          tags: |
            type=sha,prefix=${{ github.ref_name }}-,format=short,priority=900
            type=ref,event=branch
          flavor: |
            latest=false

      - name: Build to tar
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.context }}/${{ inputs.dockerfile }}
          platforms: linux/amd64
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ inputs.app_name }}
          cache-to: type=gha,mode=max,scope=${{ inputs.app_name }}
          outputs: type=docker,dest=/tmp/image-${{ inputs.app_name }}.tar

      - name: Trivy scan tar image
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          input: /tmp/image-${{ inputs.app_name }}.tar
          format: table
          exit-code: 0
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-${{ inputs.app_name }}-${{ github.run_id }}
          path: /tmp/image-${{ inputs.app_name }}.tar
          retention-days: 1

  # ─────────────────────────────────────────────
  # Push image lên GHCR
  # ─────────────────────────────────────────────
  push:
    name: "[${{ inputs.app_name }}] Push Image"
    runs-on: ubuntu-latest
    needs: build-scan
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    outputs:
      image_digest: ${{ steps.push.outputs.digest }}
      image_ref: ${{ needs.build-scan.outputs.image_ref }}
      image_tag: ${{ needs.build-scan.outputs.image_tag }}   # forward cho job release
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: image-${{ inputs.app_name }}-${{ github.run_id }}
          path: /tmp

      - name: Load image into docker daemon
        run: docker load -i /tmp/image-${{ inputs.app_name }}.tar

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image (all tags)
        id: push
        run: |
          docker push --all-tags ${{ inputs.image_name }}
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' \
            ${{ needs.build-scan.outputs.image_ref }} | cut -d@ -f2)
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────
  # Release — gộp Cosign sign + update GitOps (deploy)
  # 1 lần approve qua environment. Chạy khi enable_sign HOẶC enable_deploy.
  #   • cosign : chỉ khi enable_sign=true (vd prod)
  #   • deploy : chỉ khi enable_deploy=true → patch tag vào repo GitOps
  # ─────────────────────────────────────────────
  release:
    name: "[${{ inputs.app_name }}] Release (Sign + Deploy)"
    runs-on: ubuntu-latest
    needs: push
    if: github.event_name == 'push' && (inputs.enable_sign || inputs.enable_deploy)
    environment: ${{ inputs.sign_environment }}    # pause chờ approve (1 lần)
    # Serialize deploy: FE/BE cùng commit vào 1 repo GitOps → cho chạy
    # tuần tự thay vì song song để tránh đua push (kèm retry+rebase ở dưới).
    concurrency:
      group: gitops-deploy-${{ github.ref_name }}
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
    steps:
      # ── Cosign sign (chỉ khi enable_sign) ──────────────
      - uses: sigstore/cosign-installer@v3
        if: inputs.enable_sign

      - name: Login to GHCR
        if: inputs.enable_sign
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign image
        if: inputs.enable_sign
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          echo "${{ secrets.COSIGN_PRIVATE_KEY }}" > /tmp/cosign.key
          cosign sign --yes --key /tmp/cosign.key \
            -a "app=${{ inputs.app_name }}" \
            -a "git-sha=${{ github.sha }}" \
            -a "branch=${{ github.ref_name }}" \
            -a "run-id=${{ github.run_id }}" \
            ${{ inputs.image_name }}@${{ needs.push.outputs.image_digest }}
          rm -f /tmp/cosign.key

      # ── Update GitOps (chỉ khi enable_deploy) ──────────
      - name: Patch image tag in GitOps repo
        if: inputs.enable_deploy
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_GITOPS_TOKEN }}
          IMAGE: ${{ inputs.image_name }}
          TAG: ${{ needs.push.outputs.image_tag }}
          GITOPS_REPO: ${{ inputs.gitops_repo }}
          GITOPS_FILES: ${{ inputs.gitops_files }}
        run: |
          set -euo pipefail
          # Guard: tuyệt đối không commit image thiếu tag vào GitOps
          if [ -z "${TAG}" ]; then
            echo "✗ TAG rỗng — abort để không ghi image hỏng vào GitOps." >&2
            exit 1
          fi
          git clone "https://oauth2:${GITLAB_TOKEN}@${GITOPS_REPO}" gitops
          cd gitops

          export NEW_IMAGE="${IMAGE}:${TAG}"
          echo "→ Patch image -> ${NEW_IMAGE}"

          # yq (mikefarah v4, có sẵn trên runner): duyệt mọi map có .image,
          # chỉ thay khi image khớp prefix "${IMAGE}:" — giữ nguyên container khác,
          # giữ indent, an toàn với manifest multi-document (---).
          for f in ${GITOPS_FILES}; do
            echo "  • $f"
            IMAGE="$IMAGE" NEW_IMAGE="$NEW_IMAGE" yq -i \
              '(.. | select(tag == "!!map" and (.image // "" | test("^" + strenv(IMAGE) + ":"))).image) = strenv(NEW_IMAGE)' \
              "$f"
          done

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "Không có thay đổi tag — bỏ qua commit."
            exit 0
          fi

          git add ${GITOPS_FILES}
          # Nhiều -m để body không bị dính indent của YAML 'run: |'
          git commit \
            -m "[CI-PIPELINE] Update ${NEW_IMAGE}" \
            -m "image: ${NEW_IMAGE}" \
            -m "app: ${{ inputs.app_name }}" \
            -m "source-repo: ${{ github.repository }}" \
            -m "git-sha: ${{ github.sha }}" \
            -m "run-id: ${{ github.run_id }}"

          # Retry + rebase: FE/BE release chạy song song cùng push vào main,
          # đứa sau sẽ bị reject (non-fast-forward). Rebase lên remote mới rồi
          # push lại — patch của ta chỉ đụng 1 file nên không bao giờ conflict.
          BRANCH="$(git rev-parse --abbrev-ref HEAD)"
          for i in 1 2 3 4 5; do
            if git push origin "HEAD:${BRANCH}"; then
              echo "✓ Đã push tag mới lên GitOps — ArgoCD sẽ sync."
              exit 0
            fi
            echo "↻ push bị reject (lần $i) — rebase lên remote rồi thử lại…"
            git pull --rebase origin "${BRANCH}"
          done
          echo "✗ Push thất bại sau 5 lần thử." >&2
          exit 1
